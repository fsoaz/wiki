services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: wikiai
      POSTGRES_USER: wikiai
      POSTGRES_PASSWORD: wikiai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d:ro

volumes:
  postgres-data:

